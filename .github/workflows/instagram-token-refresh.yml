name: Instagram Token Refresh

# Erneuert den Instagram Access Token woechentlich automatisch und schreibt
# ihn per GitHub-API direkt ins Secret INSTAGRAM_ACCESS_TOKEN zurueck - keine
# manuelle Aktion mehr noetig. Braucht das Secret GH_PAT (Classic PAT, Scope
# "repo", siehe README/Chat-Anleitung fuer die Einrichtung).
# Woechentlich statt taeglich: der Token ist 60 Tage gueltig, daher reicht ein
# grosser zeitlicher Puffer - das reduziert unnoetige Fehlversuche/Issues bei
# kurzzeitigen API-Ausfaellen, ohne die Sicherheit zu gefaehrden.
on:
  schedule:
    - cron: "0 3 * * 0" # jeden Sonntag um 3 Uhr
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Token erneuern und GitHub Secret automatisch aktualisieren
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          npm install --no-save libsodium-wrappers
          node scripts/instagram-token-refresh.mjs

      - name: Bei Fehler benachrichtigen
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Automatische Instagram-Token-Erneuerung fehlgeschlagen',
              body: `Die automatische Erneuerung des Instagram-Tokens ist fehlgeschlagen.

              Moegliche Ursachen:
              - Das Secret \`GH_PAT\` fehlt, ist ungueltig oder wurde widerrufen
              - Der Instagram-Account hat den App-Zugriff widerrufen
              - Der bestehende Token ist bereits laenger als 60 Tage nicht erneuert worden

              Workflow-Log: [Hier ansehen](https://github.com/${context.repo.owner}/${context.repo.repo}/actions)

              Falls noetig: Token manuell ueber das Facebook-Dashboard (App "RS-Heimbach" → Instagram API → API-Einrichtung mit Instagram-Login → "Token generieren") neu erzeugen und als Secret INSTAGRAM_ACCESS_TOKEN speichern.`,
              labels: ['token-refresh', 'urgent']
            });
